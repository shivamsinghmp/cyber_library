name: Deploy to DigitalOcean

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_KEY }}
          port: 22
          script: |
            cd /var/www/cyber_library
            git pull origin main
            npm install
            npm run build
            if pm2 list | grep -q "cyber-library"; then
              pm2 restart cyber-library
            else
              pm2 start npm --name "cyber-library" -- start
            fi