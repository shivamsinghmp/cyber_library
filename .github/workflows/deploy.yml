name: Deploy to GCP VM

on:
  push:
    branches:
      - main  # Jab aap 'main' branch par push karenge tabhi chalega

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            cd /var/www/cyber_library
            git pull origin main
            npm install
            npx prisma generate
            npm run build
            pm2 restart cyber-app