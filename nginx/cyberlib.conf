# Nginx config for cyberlib.in
# Place at: /etc/nginx/sites-available/cyberlib.in
# Enable: ln -s /etc/nginx/sites-available/cyberlib.in /etc/nginx/sites-enabled/
# SSL:  sudo certbot --nginx -d cyberlib.in -d www.cyberlib.in

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=10r/m;
limit_conn_zone $binary_remote_addr zone=conn_limit:10m;

# Upstream — PM2 cluster on port 3000
upstream nextjs {
  server 127.0.0.1:3000;
  keepalive 64;
}

# HTTP → HTTPS redirect
server {
  listen 80;
  listen [::]:80;
  server_name cyberlib.in www.cyberlib.in;
  return 301 https://$host$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name cyberlib.in www.cyberlib.in;

  # SSL (managed by Certbot)
  ssl_certificate     /etc/letsencrypt/live/cyberlib.in/fullchain.pem;
  ssl_certificate_key /etc/letsencrypt/live/cyberlib.in/privkey.pem;
  ssl_protocols       TLSv1.2 TLSv1.3;
  ssl_ciphers         HIGH:!aNULL:!MD5;
  ssl_session_cache   shared:SSL:10m;
  ssl_session_timeout 10m;

  # Compression
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_min_length 1024;
  gzip_types text/plain text/css text/javascript application/javascript
             application/json application/xml image/svg+xml;

  # Security headers
  add_header X-Content-Type-Options  "nosniff"                   always;
  add_header X-Frame-Options         "SAMEORIGIN"                always;
  add_header X-XSS-Protection        "1; mode=block"             always;
  add_header Referrer-Policy         "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Max upload size (for question image uploads)
  client_max_body_size 6M;

  # Connection limit per IP
  limit_conn conn_limit 20;

  # Static files — served by Nginx, NOT Node.js
  location /_next/static/ {
    alias /home/cyberlib/app/.next/static/;  # ← update path
    expires 1y;
    add_header Cache-Control "public, immutable";
    access_log off;
  }

  location /public/ {
    root /home/cyberlib/app;  # ← update path
    expires 30d;
    add_header Cache-Control "public";
    access_log off;
  }

  # Auth endpoints — stricter rate limit
  location ~ ^/api/(auth|login|signup) {
    limit_req zone=auth_limit burst=5 nodelay;
    proxy_pass http://nextjs;
    include /etc/nginx/proxy_params;
  }

  # API routes — standard rate limit
  location /api/ {
    limit_req zone=api_limit burst=15 nodelay;
    proxy_pass http://nextjs;
    include /etc/nginx/proxy_params;
  }

  # Health check — no rate limit (for uptime monitors)
  location /api/health {
    proxy_pass http://nextjs;
    access_log off;
  }

  # All other routes → Next.js
  location / {
    proxy_pass http://nextjs;
    include /etc/nginx/proxy_params;
  }
}
