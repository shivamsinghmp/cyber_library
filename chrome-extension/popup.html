<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      background: #0d0c14;
      color: #f0ede6;
      font-family: system-ui, sans-serif;
      border-radius: 12px;
      overflow: hidden;
    }
    .header {
      background: linear-gradient(135deg, rgba(197,169,122,.12), rgba(0,0,0,0));
      border-bottom: 1px solid rgba(197,169,122,.15);
      padding: 14px 16px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo {
      width: 32px; height: 32px;
      background: rgba(197,169,122,.15);
      border: 1px solid rgba(197,169,122,.3);
      border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
    }
    .brand { font-size: 12px; font-weight: 800; color: #c5a97a; letter-spacing: .08em; text-transform: uppercase; }
    .subtitle { font-size: 9px; color: #8a7f6e; margin-top: 1px; }

    .body { padding: 14px 16px; display: flex; flex-direction: column; gap: 8px; }

    .btn {
      width: 100%;
      padding: 11px 14px;
      border-radius: 10px;
      border: 1px solid rgba(197,169,122,.2);
      background: rgba(197,169,122,.07);
      color: #c5a97a;
      font-size: 11px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: all .15s;
      text-align: left;
    }
    .btn:hover { background: rgba(197,169,122,.15); border-color: rgba(197,169,122,.4); transform: translateY(-1px); }
    .btn:active { transform: scale(.98); }
    .btn.primary {
      background: #c5a97a;
      color: #1a1208;
      border-color: #c5a97a;
      box-shadow: 0 0 20px rgba(197,169,122,.25);
    }
    .btn.primary:hover { background: #d4bc8e; box-shadow: 0 0 28px rgba(197,169,122,.4); }
    .btn.red { border-color: rgba(239,68,68,.2); background: rgba(239,68,68,.07); color: #f87171; }
    .btn.red:hover { background: rgba(239,68,68,.15); border-color: rgba(239,68,68,.4); }
    .btn-icon { font-size: 16px; flex-shrink: 0; }
    .btn-label { flex: 1; }
    .btn-desc { font-size: 9px; color: inherit; opacity: .6; margin-top: 1px; font-weight: 500; }

    .section-title {
      font-size: 8px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: #5a554d;
      margin-top: 4px;
    }

    .status {
      padding: 8px 12px;
      border-radius: 8px;
      font-size: 10px;
      font-weight: 600;
      text-align: center;
      display: none;
    }
    .status.success { background: rgba(52,211,153,.1); border: 1px solid rgba(52,211,153,.2); color: #34d399; display: block; }
    .status.error { background: rgba(239,68,68,.1); border: 1px solid rgba(239,68,68,.2); color: #f87171; display: block; }

    .divider { height: 1px; background: rgba(255,255,255,.06); margin: 4px 0; }

    .footer {
      padding: 8px 16px 10px;
      text-align: center;
      font-size: 9px;
      color: #3d3830;
      border-top: 1px solid rgba(255,255,255,.05);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">🎓</div>
    <div>
      <div class="brand">Cyber Library</div>
      <div class="subtitle">Picture-in-Picture Extension</div>
    </div>
  </div>

  <div class="body">
    <div class="section-title">Current Tab</div>

    <button class="btn primary" id="pipCurrentTab">
      <span class="btn-icon">⊡</span>
      <div class="btn-label">
        Open in PiP
        <div class="btn-desc">Current tab ko PiP window mein kholein</div>
      </div>
    </button>

    <div class="divider"></div>
    <div class="section-title">Quick Open — Cyber Library</div>

    <button class="btn" id="openPanel">
      <span class="btn-icon">📋</span>
      <div class="btn-label">
        Study Panel
        <div class="btn-desc">Meet Add-on panel PiP mein</div>
      </div>
    </button>

    <button class="btn" id="openDashboard">
      <span class="btn-icon">🏠</span>
      <div class="btn-label">
        Dashboard
        <div class="btn-desc">Student dashboard PiP mein</div>
      </div>
    </button>

    <button class="btn" id="openMain">
      <span class="btn-icon">🖥️</span>
      <div class="btn-label">
        Main Stage
        <div class="btn-desc">Meet Main Stage PiP mein</div>
      </div>
    </button>

    <div class="divider"></div>

    <button class="btn red" id="closePip">
      <span class="btn-icon">✕</span>
      <div class="btn-label">
        Close PiP
        <div class="btn-desc">Saari PiP windows band karein</div>
      </div>
    </button>

    <div class="status" id="status"></div>
  </div>

  <div class="footer">cyberlib.in · Study smarter 📚</div>

  <script src="popup.js"></script>
</body>
</html>
